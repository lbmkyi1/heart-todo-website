<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="OyZfG40ZwzMoCmb2QIc1vcKohVR83va2tyqoMp4zYVc" />
    <meta name="google-site-verification" content="0Bk2F-Pr6i89uLbYyr_f1UidrTW-LaUPAzUJTRFUchw" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blue Todo List - A cute heart-themed to-do list app with background music. Manage your tasks with a beautiful blue & pink design.">
    <meta name="keywords" content="Blue Todo List, Heart Todo, to-do list, task manager, cute todo app, blue theme todo">
    <meta name="author" content="Blue Heart">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="💙 Blue Todo List - Heart Todo App">
    <meta property="og:description" content="A cute heart-themed to-do list app with beautiful blue & pink design and relaxing background music.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://just-blue-todo.lbmkyi1.workers.dev/">
    <meta property="og:image" content="https://just-blue-todo.lbmkyi1.workers.dev/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="💙 Blue Todo List - Heart Todo App">
    <meta name="twitter:description" content="A cute heart-themed to-do list app with beautiful blue & pink design.">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>💙 Blue Todo List - Heart Todo App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="kitty-bg"></div>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-heart"></i></div>
            <nav>
                <a href="#" class="nav-item active"><i class="fas fa-home"></i></a>
                <a href="#" class="nav-item"><i class="fas fa-tasks"></i></a>
                <a href="#" class="nav-item"><i class="fas fa-check"></i></a>
            </nav>
        </aside>
        <main class="main">
            <header>
                <h1>Blue Heart - Todo List</h1>
                <p id="date"></p>
            </header>
            
            <div class="heart-window-container">
                <div class="heart-window">
                    <div class="heart-content">
                        <div class="heart-header">
                            <i class="fas fa-heart"></i>
                            <span>New Task</span>
                        </div>
                        <textarea id="input" placeholder="Write something sweet..."></textarea>
                        <button id="add"><i class="fas fa-plus"></i> Add to Heart</button>
                    </div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
                <span id="progressText">0% Complete</span>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Done</button>
            </div>

            <ul id="list"></ul>
            
            <div class="bottom-bar">
                <span><span id="left">0</span> tasks left</span>
                <button id="clear">Clear Completed</button>
            </div>
        </main>
    </div>
    <audio id="music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
    <script src="app.js?v=4"></script>
</body>
</html>
